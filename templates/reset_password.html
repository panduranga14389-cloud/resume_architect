<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Password</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=700;800&family=Space+Grotesk:wght=500;700&display=swap');
        :root { --bg-canvas: #F1F5F9; --surface: #FFFFFF; --dark-crust: #0F172A; --mint-core: #10B981; }
        body { background-color: var(--bg-canvas); color: var(--dark-crust); font-family: 'Space Grotesk', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .brutal-card { background: var(--surface); border: 3px solid var(--dark-crust); border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 90%; box-shadow: 6px 6px 0px var(--dark-crust); }
        h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.2rem; font-weight: 800; text-transform: uppercase; margin: 0 0 0.5rem 0; letter-spacing: -1px; }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        label { display: block; font-weight: 700; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.85rem 1rem; border: 3px solid var(--dark-crust); border-radius: 8px; box-sizing: border-box; font-size: 1rem; font-weight: 700; }
        .pass-toggle-icon { position: absolute; right: 16px; top: 38px; cursor: pointer; }
        .btn-brutal { background: var(--mint-core); color: white; border: 3px solid var(--dark-crust); padding: 0.85rem 1.5rem; font-weight: 700; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 3px 3px 0px var(--dark-crust); }
    </style>
</head>
<body>
    <div class="brutal-card">
        <h2>Reset Keys</h2>
        <p style="color: #64748B; margin-bottom: 2rem; font-weight: 500;">Overhaul security configuration metrics.</p>
        
        <form method="POST" action="/reset-password">
            <div class="form-group">
                <label>Confirm Account Email</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>New Secured Password</label>
                <input type="password" id="new_pass_field" name="password" class="form-control" required placeholder="••••••••">
                <span class="pass-toggle-icon" onclick="togglePass('new_pass_field')">👁️</span>
            </div>
            <button type="submit" class="btn-brutal">Rewrite System Keys</button>
        </form>
    </div>
    <script>
        function togglePass(fieldId) {
            const el = document.getElementById(fieldId);
            if (el) el.type = el.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
