<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - System Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root {
            --bg-canvas: #F1F5F9;
            --surface: #FFFFFF;
            --dark-crust: #0F172A;
            --mint-core: #10B981;
            --mint-hover: #059669;
            --muted-gray: #64748B;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--dark-crust);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brutal-card {
            background: var(--surface);
            border: 3px solid var(--dark-crust);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 6px 6px 0px var(--dark-crust);
        }

        h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0 0 0.5rem 0;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--muted-gray);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 3px solid var(--dark-crust);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            background-color: var(--surface);
        }

        .form-control:focus {
            outline: none;
            background-color: #F8FAFC;
        }

        .pass-toggle-icon {
            position: absolute;
            right: 16px;
            top: 38px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-brutal {
            background: var(--mint-core);
            color: var(--surface);
            border: 3px solid var(--dark-crust);
            padding: 0.85rem 1.5rem;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px var(--dark-crust);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-brutal:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--dark-crust);
        }

        .flash-msg {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-weight: 700;
            margin-bottom: 1.5rem;
            border: 3px solid var(--dark-crust);
        }
        .flash-msg.error { background-color: #FEE2E2; }
        .flash-msg.success { background-color: #D1FAE5; }

        a {
            color: var(--dark-crust);
            text-decoration: underline;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="brutal-card">
        <h2>Sign In</h2>
        <p class="subtitle">System Core Identity Authentication</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash-msg {{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login_pass" name="password" class="form-control" required placeholder="••••••••">
                <span class="pass-toggle-icon" onclick="togglePass('login_pass')">👁️</span>
            </div>
            <button type="submit" class="btn-brutal">Sign In to Workspace</button>
        </form>
        
        <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem; display: flex; flex-direction: column; gap: 10px;">
            <a href="/forgot-password">Forgot password?</a>
            <span style="color: var(--muted-gray);">Need an account? <a href="/signup">Create one here</a></span>
        </div>
    </div>

    <script>
        function togglePass(fieldId) {
            const el = document.getElementById(fieldId);
            if (el) el.type = el.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
