<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - System Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap');
        :root {
            --bg-canvas: #F1F5F9; --surface: #FFFFFF; --dark-crust: #0F172A;
            --mint-core: #10B981; --muted-gray: #64748B;
        }
        body { background-color: var(--bg-canvas); color: var(--dark-crust); font-family: 'Space Grotesk', sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .brutal-card { background: var(--surface); border: 3px solid var(--dark-crust); border-radius: 16px; padding: 2.5rem; max-width: 440px; width: 90%; box-shadow: 6px 6px 0px var(--dark-crust); }
        h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.2rem; font-weight: 800; text-transform: uppercase; margin: 0 0 0.5rem 0; letter-spacing: -1px; }
        .subtitle { color: var(--muted-gray); font-size: 1rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; position: relative; }
        label { display: block; font-weight: 700; margin-bottom: 0.4rem; font-size: 0.9rem; text-transform: uppercase; }
        .form-control { width: 100%; padding: 0.8rem 1rem; border: 3px solid var(--dark-crust); border-radius: 8px; box-sizing: border-box; font-size: 1rem; font-weight: 700; font-family: inherit; }
        .pass-toggle-icon { position: absolute; right: 16px; top: 36px; cursor: pointer; }
        .btn-brutal { background: var(--mint-core); color: white; border: 3px solid var(--dark-crust); padding: 0.85rem 1.5rem; font-weight: 700; font-size: 1rem; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 3px 3px 0px var(--dark-crust); transition: all 0.1s; }
        .btn-brutal:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--dark-crust); }
        .flash-msg { padding: 0.85rem 1rem; border-radius: 8px; font-weight: 700; margin-bottom: 1.5rem; border: 3px solid var(--dark-crust); background-color: #FEE2E2; }
        a { color: var(--dark-crust); text-decoration: underline; font-weight: 700; }
    </style>
</head>
<body>
    <div class="brutal-card">
        <h2>Register</h2>
        <p class="subtitle">System Core Registration Portal</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash-msg">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pass_field" name="password" class="form-control" required placeholder="••••••••">
                <span class="pass-toggle-icon" onclick="togglePass('pass_field')">👁️</span>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm_field" name="confirm_password" class="form-control" required placeholder="••••••••">
                <span class="pass-toggle-icon" onclick="togglePass('confirm_field')">👁️</span>
            </div>
            <button type="submit" class="btn-brutal">Initialize Account</button>
        </form>
        <p style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--muted-gray);">
            Already verified? <a href="/login">Sign In</a>
        </p>
    </div>
    <script>
        function togglePass(fieldId) {
            const el = document.getElementById(fieldId);
            if (el) el.type = el.type === "password" ? "text" : "password";
        }
    </script>
</body>
</html>
